refresh:
  name: Refresh UK Police Data
  description: Force an immediate refresh of UK Police data for all (or a specific) configured area.
  fields:
    entry_id:
      name: Config Entry ID
      description: Optional. The config entry ID of a specific area to refresh. Leave blank to refresh all areas.
      required: false
      selector:
        text:

get_crimes:
  name: Get Crimes Data
  description: >
    Fires a `uk_police_crimes_data` event on the event bus containing the raw
    street-level crime list for the selected area. Useful for automations and
    custom Lovelace cards.
  fields:
    entry_id:
      name: Config Entry ID
      description: Optional. Specific config entry to retrieve crimes for.
      required: false
      selector:
        text:

get_stop_search:
  name: Get Stop & Search Data
  description: >
    Fires a `uk_police_stop_search_data` event containing the raw stop & search
    records for the selected area.
  fields:
    entry_id:
      name: Config Entry ID
      description: Optional. Specific config entry to retrieve stop & search data for.
      required: false
      selector:
        text:
